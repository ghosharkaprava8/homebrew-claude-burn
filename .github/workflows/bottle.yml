name: Build & publish bottles

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name"
        default: claude-burn
        required: true
      version:
        description: "Version (e.g. 0.1.0)"
        default: "0.1.0"
        required: true
  push:
    branches: [main]
    paths:
      - "Formula/**.rb"
      - ".github/workflows/bottle.yml"

permissions:
  contents: write

env:
  FORMULA: ${{ github.event.inputs.formula || 'claude-burn' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Symlink workspace as tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/${GITHUB_REPOSITORY_OWNER}/homebrew-claude-burn"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Detect version from formula
        run: |
          set -e
          FQN="${GITHUB_REPOSITORY_OWNER}/claude-burn/${FORMULA}"
          v="$(brew info --json=v2 "$FQN" | python3 -c 'import json,sys;print(json.load(sys.stdin)["formulae"][0]["versions"]["stable"])')"
          echo "Detected version: $v"
          echo "VERSION=$v" >> "$GITHUB_ENV"

      - name: Build bottle
        run: |
          set -e
          FQN="${GITHUB_REPOSITORY_OWNER}/claude-burn/${FORMULA}"
          ROOT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${FORMULA}-${VERSION}"
          brew install --build-bottle --verbose "$FQN"
          brew bottle --json --no-rebuild --root-url="$ROOT_URL" "$FQN"
          ls -la *.bottle.* || true

      - name: Rename bottle (homebrew uses -- separator)
        run: |
          for f in *--*.bottle.*.tar.gz; do
            [ -e "$f" ] || continue
            new="$(echo "$f" | sed 's/--/-/')"
            mv "$f" "$new"
          done
          ls -la *.bottle.* || true

      - uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Homebrew/actions/setup-homebrew@main

      - uses: actions/download-artifact@v4
        with:
          path: bottles/
          merge-multiple: true

      - name: Inspect downloads
        run: ls -la bottles/

      - name: Symlink workspace as tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/${GITHUB_REPOSITORY_OWNER}/homebrew-claude-burn"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Detect version from formula
        run: |
          set -e
          FQN="${GITHUB_REPOSITORY_OWNER}/claude-burn/${FORMULA}"
          v="$(brew info --json=v2 "$FQN" | python3 -c 'import json,sys;print(json.load(sys.stdin)["formulae"][0]["versions"]["stable"])')"
          echo "Detected version: $v"
          echo "VERSION=$v" >> "$GITHUB_ENV"

      - name: Merge bottle JSONs into formula
        working-directory: bottles
        run: |
          set -e
          brew bottle --merge --write --no-commit *.bottle.json

      - name: Verify formula updated
        run: |
          grep -n "sha256" "Formula/${FORMULA}.rb" || true

      - name: Rename bottles to single-dash form (brew root_url convention)
        run: |
          set -e
          shopt -s nullglob
          for f in bottles/*--*.bottle.*.tar.gz; do
            mv "$f" "${f//--/-}"
          done
          ls bottles/

      - name: Create / update GitHub Release with bottles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${FORMULA}-${VERSION}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "Bottles for ${FORMULA} ${VERSION}" \
              --notes "Pre-built Homebrew bottles for \`${FORMULA}\` ${VERSION}."
          fi
          gh release upload "$tag" bottles/*.bottle.tar.gz --clobber

      - name: Commit formula update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if git diff --quiet "Formula/${FORMULA}.rb"; then
            echo "No formula changes."
            exit 0
          fi
          git config user.name "Arkaprava Ghosh"
          git config user.email "ghosharkaprava8@gmail.com"
          git add "Formula/${FORMULA}.rb"
          git commit -m "chore(${FORMULA}): bottles for ${VERSION} [skip ci]"
          branch="${GITHUB_REF#refs/heads/}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${branch}"
